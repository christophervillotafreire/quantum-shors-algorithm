[general]
number_to_factor = 15
random_a = 4
phases_max_top_number = 5
only_coprimes_a = true
use_optimal_a = true
only_isas_stats = false
control_qubits = 0
isa_number = 0
circuit_class = register
ibm_account_name = ibm_cloud_free
ibm_quantum_processor = ibm_torino
backend_class = ideal
sampler_class = aer_sampler
verbose = false
from_isas = false
backend_use_fractional_gates = false

[transpiler]
transpiler_optimization_level = 3
transpiler_seed = 457
transpiler_approximation_degree = 0.7
transpiler_unitary_method = default
transpiler_layout_method = sabre
transpiler_routing_method = sabre
transpiler_translation_method = ibm_fractional
transpiler_pass_planning_method = alap

[sampler]
sampler_shots_number = 1024
sampler_dynamical_decoupling = false
sampler_dd_sequence_type = XpXm
sampler_dd_slack_dist = edges
sampler_dd_scheduling_method = alap
sampler_dd_skip_reset_qubits = false
sampler_pt_enable_gates = true
sampler_pt_enable_measure = true
sampler_pt_number_randomizations = auto
sampler_pt_shots_randomization = auto
sampler_pt_strategy = active

[sabre]
sabre_optimization = true
sabre_max_iterations = 10
sabre_layout_trials = 200
sabre_swap_trials = 200

